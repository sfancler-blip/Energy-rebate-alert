# Self-contained daily monitor for a single site.
# Copy to .github/workflows/monitor-<SLUG>.yml and replace <SLUG> below.
# Independent of every other monitor: its own schedule, its own state file.
name: Monitor <SLUG>

on:
  schedule:
    - cron: '0 13 * * *'   # daily ~13:00 UTC (~6am PT). Adjust per monitor.
  workflow_dispatch:         # manual "Run workflow" button

# Only concurrent runs of THIS monitor are serialized; other monitors are unaffected.
concurrency:
  group: monitor-<SLUG>
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # to commit this monitor's state.json back
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright + Chromium
        run: |
          pip install -r monitors/<SLUG>/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run monitor
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python monitors/<SLUG>/monitor.py

      - name: Commit updated state
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add monitors/<SLUG>/state.json monitors/<SLUG>/monitor.log
          git diff --staged --quiet || git commit -m "chore(<SLUG>): update monitor state [skip ci]"
          git push
