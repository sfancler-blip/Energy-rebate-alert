# Self-contained daily monitor for the Aug 21 Portland, OR show (String & Shadow).
# Independent of every other monitor: its own schedule, its own state file.
name: String and Shadow

on:
  schedule:
    - cron: '0 13 * * *'   # daily ~13:00 UTC (~6am PT)
  workflow_dispatch:         # manual "Run workflow" button

concurrency:
  group: monitor-portland-aug21
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # to commit this monitor's state.json back
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Playwright + Chromium
        run: |
          pip install -r monitors/portland-aug21/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run monitor
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        run: python monitors/portland-aug21/monitor.py

      - name: Commit updated state
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add monitors/portland-aug21/state.json monitors/portland-aug21/monitor.log
          git diff --staged --quiet || git commit -m "chore(portland-aug21): update monitor state [skip ci]"
          git push
