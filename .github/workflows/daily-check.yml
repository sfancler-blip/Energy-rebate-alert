name: Daily Webpage Monitor

on:
  schedule:
    - cron: '0 9 * * *'   # 9:00 AM UTC every day — adjust as needed
  workflow_dispatch:        # Allows manual trigger from the GitHub UI

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # Needed to commit state.json and monitor.log back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run monitor
        env:
          TARGET_URL: ${{ vars.TARGET_URL }}
          ALERT_MESSAGE: ${{ vars.ALERT_MESSAGE }}
          WATCH_TEXT: ${{ vars.WATCH_TEXT }}
          MISSING_TEXT_MESSAGE: ${{ vars.MISSING_TEXT_MESSAGE }}
          MODE: ${{ vars.MODE }}
          PHONE: ${{ secrets.PHONE }}
          TEXTBELT_APIKEY: ${{ secrets.TEXTBELT_APIKEY }}
        run: python monitor.py

      - name: Job summary
        run: |
          TEXT_FOUND=$(python3 -c "import json; s=json.load(open('state.json')); print(s.get('text_found'))")
          MODE_VAL="${{ vars.MODE }}"
          if [ "$MODE_VAL" = "text" ]; then
            if [ "$TEXT_FOUND" = "True" ]; then
              echo "## ✅ Watch text FOUND" >> $GITHUB_STEP_SUMMARY
            elif [ "$TEXT_FOUND" = "False" ]; then
              echo "## ❌ Watch text NOT found" >> $GITHUB_STEP_SUMMARY
            else
              echo "## 🔄 Baseline established (first run)" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "## ✅ Hash check complete" >> $GITHUB_STEP_SUMMARY
          fi
          echo "**URL:** ${{ vars.TARGET_URL }}" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** ${MODE_VAL:-hash}" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Commit updated state and log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json monitor.log
          git diff --staged --quiet || git commit -m "chore: update monitor state [skip ci]"
          git push
